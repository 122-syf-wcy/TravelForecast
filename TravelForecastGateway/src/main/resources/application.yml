server:
  port: 8888
  # 网关作为统一入口，不需要context-path

spring:
  application:
    name: travel-gateway
  
  # Redis配置（用于限流和缓存）
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 2  # 网关使用独立的Redis数据库
      timeout: 3000
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 5
          max-wait: 3000

  # Nacos 服务注册与发现
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848   # Nacos服务端地址
        namespace: public             # 命名空间
        group: DEFAULT_GROUP
        # username: nacos             # 开启鉴权后取消注释
        # password: nacos
        fail-fast: false              # Nacos不可用时不阻止启动
    
    # Spring Cloud Gateway 配置
    gateway:
      # 全局CORS配置
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins:
              - "http://localhost:3000"      # 前端开发地址
              - "http://localhost:5173"       # Vite开发地址
              - "http://localhost:8081"       # 其他前端服务
              - "*"                           # 生产环境请指定具体域名
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowed-headers:
              - "*"
            allow-credentials: true
            max-age: 3600
      
      # 路由配置
      routes:
        # ==================== 业务后端服务 ====================
        - id: business-service
          uri: http://localhost:8080
          predicates:
            - Path=/api/**
          filters:
            - StripPrefix=1  # 去掉 /api 前缀，转发到 http://localhost:8080/**
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100  # 每秒允许的请求数
                redis-rate-limiter.burstCapacity: 200  # 突发容量
                redis-rate-limiter.requestedTokens: 1
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY,INTERNAL_SERVER_ERROR
                methods: GET,POST
                backoff:
                  firstBackoff: 50ms
                  maxBackoff: 500ms
                  factor: 2
                  basedOnPreviousValue: false
        
        # ==================== AI智能服务 ====================
        - id: ai-service
          uri: http://localhost:8081
          predicates:
            - Path=/ai-api/**
          filters:
            - StripPrefix=1  # 去掉 /ai-api 前缀
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50   # AI服务限流更严格
                redis-rate-limiter.burstCapacity: 100
                redis-rate-limiter.requestedTokens: 1
            - name: Retry
              args:
                retries: 2
                statuses: BAD_GATEWAY,INTERNAL_SERVER_ERROR
                methods: GET,POST
        
        # ==================== 小程序后端服务 ====================
        - id: miniprogram-service
          uri: http://localhost:8082
          predicates:
            - Path=/miniprogram-api/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 80
                redis-rate-limiter.burstCapacity: 150
                redis-rate-limiter.requestedTokens: 1
        
        # ==================== Python预测服务 ====================
        - id: prediction-service
          uri: http://localhost:8001
          predicates:
            - Path=/prediction-api/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 30   # 预测服务计算密集，限流更严格
                redis-rate-limiter.burstCapacity: 60
                redis-rate-limiter.requestedTokens: 1
            - name: Retry
              args:
                retries: 2
                statuses: BAD_GATEWAY,INTERNAL_SERVER_ERROR
                methods: GET,POST
        
        # ==================== 数字人服务 ====================
        - id: digital-human-service
          uri: http://localhost:8083
          predicates:
            - Path=/digital-human-api/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 40
                redis-rate-limiter.burstCapacity: 80
                redis-rate-limiter.requestedTokens: 1
        
        # ==================== WebSocket代理（数字人） ====================
        - id: digital-human-websocket
          uri: ws://localhost:8083
          predicates:
            - Path=/ws/**
          filters:
            - StripPrefix=1

      # 默认过滤器（全局应用）
      default-filters:
        - name: DedupeResponseHeader
          args:
            name: Access-Control-Allow-Credentials
            strategy: RETAIN_FIRST
        - name: DedupeResponseHeader
          args:
            name: Access-Control-Allow-Origin
            strategy: RETAIN_FIRST

# 网关配置
gateway:
  # JWT配置（与业务后端保持一致）
  jwt:
    secret: TravelPredictionSecretKey2025LiupanshuiTourismSystem
    expiration: 604800
    token-prefix: Bearer
    header: Authorization
  
  # 认证白名单（不需要JWT验证的路径）
  whitelist:
    - /api/auth/login
    - /api/auth/register
    - /api/auth/captcha
    - /api/auth/wechat/login
    - /miniprogram-api/**
    - /prediction-api/health
    - /digital-human-api/health
    - /actuator/**
  
  # 限流配置
  rate-limit:
    enabled: true
    default-rate: 100  # 默认每秒100请求
    default-burst: 200 # 默认突发200请求
  
  # 日志配置
  log:
    enabled: true
    log-request: true
    log-response: false  # 响应日志默认关闭（数据量大）

# Resilience4j 熔断器配置
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
    instances:
      business-service:
        baseConfig: default
        waitDurationInOpenState: 5s
      ai-service:
        baseConfig: default
        waitDurationInOpenState: 10s
      prediction-service:
        baseConfig: default
        waitDurationInOpenState: 15s

# 日志配置
logging:
  level:
    root: info
    com.travel.gateway: debug
    org.springframework.cloud.gateway: debug
    org.springframework.web: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level ${PID:- } --- [%thread] %-40.40logger{39} : %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level ${PID:- } --- [%thread] %-40.40logger{39} : %msg%n"
  file:
    name: logs/gateway.log
    max-size: 10MB
    max-history: 30

# Actuator监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
    gateway:
      enabled: true  # 启用 Gateway Actuator 端点（/actuator/gateway/routes）
  metrics:
    export:
      prometheus:
        enabled: true

