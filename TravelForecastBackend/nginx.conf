# Nginx配置文件
# 部署在阿里云服务器上

# 上游Spring Boot应用 - 业务后端
upstream travel_prediction_backend {
    server localhost:8080;
}

# 上游Spring Boot应用 - AI智能服务
upstream travel_ai_backend {
    server localhost:8081;
}

# 上游Spring Boot应用 - 小程序后端
upstream travel_mp_backend {
    server localhost:8082;
}

# HTTP重定向到HTTPS
server {
    listen 80;
    server_name api.bilibilidaxue.xyz bilibilidaxue.xyz www.bilibilidaxue.xyz;
    
    # 非HTTPS请求重定向到HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS配置
server {
    listen 443 ssl http2;
    server_name api.bilibilidaxue.xyz;
    
    # SSL证书配置（需要替换为实际证书路径）
    ssl_certificate /etc/nginx/ssl/bilibilidaxue.xyz.crt;
    ssl_certificate_key /etc/nginx/ssl/bilibilidaxue.xyz.key;
    
    # SSL安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # 日志
    access_log /var/log/nginx/travel_prediction_access.log;
    error_log /var/log/nginx/travel_prediction_error.log;
    
    # AI智能服务反向代理 (必须在/api/之前)
    location /ai-api/ {
        proxy_pass http://travel_ai_backend/ai-api/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # AI服务超时更长（模型生成耗时）
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        
        # WebSocket支持（数字人代理）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # 小程序后端API代理（管理端调用小程序后端接口）
    location /mp-api/ {
        proxy_pass http://travel_mp_backend/api/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 支持文件上传
        client_max_body_size 10m;
    }

    # 业务API反向代理
    location /api/ {
        proxy_pass http://travel_prediction_backend/api/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # WebSocket支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_buffering off;
        proxy_request_buffering off;
    }
    
    # 静态资源（如果需要）
    location /static/ {
        alias /var/www/travel_prediction/static/;
        expires 30d;
    }
    
    # 健康检查
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# 可选：根域名也指向API
server {
    listen 443 ssl http2;
    server_name bilibilidaxue.xyz www.bilibilidaxue.xyz;
    
    # SSL证书配置
    ssl_certificate /etc/nginx/ssl/bilibilidaxue.xyz.crt;
    ssl_certificate_key /etc/nginx/ssl/bilibilidaxue.xyz.key;
    
    # 重定向到API子域名
    return 301 https://api.bilibilidaxue.xyz$request_uri;
}

